name: codeql

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  schedule:
    - cron: "24 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  security-events: write

jobs:
  analyze:
    name: CodeQL
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp

      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Shopping.slnx

      - name: Build
        run: dotnet build Shopping.slnx --configuration Release --no-restore

      - name: Analyze
        uses: github/codeql-action/analyze@v4
