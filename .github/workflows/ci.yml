name: ci

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  CONFIGURATION: Release
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true

jobs:
  ci-build:
    name: ci-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Shopping.slnx

      - name: Test bootstrap helpers
        shell: pwsh
        run: ./scripts/tests/Test-BootstrapShared.ps1

      - name: Build
        run: dotnet build Shopping.slnx --configuration "$CONFIGURATION" --no-restore

      - name: Install EF Core tools
        run: dotnet tool install --tool-path ./.tools dotnet-ef --version 10.0.9

      - name: Verify EF Core migrations match the model
        run: >-
          ./.tools/dotnet-ef migrations has-pending-model-changes
          --project src/Shopping.Infrastructure/Shopping.Infrastructure.csproj
          --startup-project src/Shopping.Api/Shopping.Api.csproj
          --configuration "$CONFIGURATION"
          --no-build

  ci-test:
    name: ci-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Shopping.slnx

      - name: Test
        run: dotnet test Shopping.slnx --configuration "$CONFIGURATION" --no-restore --logger trx --results-directory TestResults

      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults/**/*.trx
          if-no-files-found: ignore
          retention-days: 14

  container-build:
    name: container-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build Web image
        run: docker build --file src/Shopping.Web/Dockerfile --tag shopping-web:validation .

      - name: Build API image
        run: docker build --file src/Shopping.Api/Dockerfile --tag shopping-api:validation .
