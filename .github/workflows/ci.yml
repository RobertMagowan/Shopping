name: ci

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  CONFIGURATION: Release
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true

jobs:
  ci-build:
    name: ci-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Shopping.slnx

      - name: Build
        run: dotnet build Shopping.slnx --configuration "$CONFIGURATION" --no-restore

  ci-test:
    name: ci-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Shopping.slnx

      - name: Test
        run: dotnet test Shopping.slnx --configuration "$CONFIGURATION" --no-restore --logger trx --results-directory TestResults

      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults/**/*.trx
          if-no-files-found: ignore
          retention-days: 14
